linear_client_usage:
  command_prefix: "PYTHONPATH=$HOME/ai python3 -m clients.linear.cli"
  contract:
    route: "Linear issue route = selected team plus optional project plus labels"
    team: "--team or --team-key selects the Linear team and label namespace"
    project: "--project accepts a Linear project UUID or slugId scoped to the selected team"
    labels: "--label is singular and repeatable for create/search/list issue commands; labels resolve in the selected team"
    apply_labels: "apply-labels keeps the plural --labels bulk input"
  examples:
    create_issue: >-
      PYTHONPATH=$HOME/ai python3 -m clients.linear.cli create-issue
      --team ACR --project acr-strategy --label hardening --label Bug
      --estimate 5
      --title "Implement project-aware labels"
    search_issues: >-
      PYTHONPATH=$HOME/ai python3 -m clients.linear.cli search-issues
      --team-key ACR --project acr-strategy --label hardening --first 25
    list_issues: >-
      PYTHONPATH=$HOME/ai python3 -m clients.linear.cli list-issues
      --team ACR --project acr-strategy --label hardening,Bug
    list_projects: >-
      PYTHONPATH=$HOME/ai python3 -m clients.linear.cli list-projects
      --team ACR --include-archived
    list_labels: >-
      PYTHONPATH=$HOME/ai python3 -m clients.linear.cli list-labels
      --team ACR
    apply_labels: >-
      PYTHONPATH=$HOME/ai python3 -m clients.linear.cli apply-labels ACR-113
      --team ACR --labels hardening,Bug
    get_issue: >-
      PYTHONPATH=$HOME/ai python3 -m clients.linear.cli get-issue ACR-113
    update_issue: >-
      PYTHONPATH=$HOME/ai python3 -m clients.linear.cli update-issue
      ACR-122 --estimate 13
    transition_issue:
      description: "Manager-owned routine status transition for a Linear issue."
      example: >-
        PYTHONPATH=$HOME/ai python3 -m clients.linear.cli transition-issue
        ACR-130 --target-status "In Progress"
      routine_states:
        - Todo
        - In Progress
        - Done
  notes:
    - "Use slugId or UUID for project tokens; project names and URLs are not accepted identifiers."
    - "Team-owned labels win over workspace labels with the same name; duplicate labels in the same tier are ambiguous."
    - "Search and list issue label filters use resolved label IDs, not raw label names."
