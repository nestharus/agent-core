schema: operator-contract-v1
source: agents/fastapi-review-operator.md
model: gpt-high
description: 'Secondary FastAPI review: framework idioms, service/controller/repository architecture, state+concurrency, Pydantic contracts, testing+observability.'
contract_status: minimum-generated-from-operator-sections
inputs:
- name: pr_number
  type: string
  required: true
  default_source: caller
  description: '`pr_number`: The PR number to review (e.g., `405`)'
- name: repo
  type: string
  required: false
  default_source: caller
  description: '`repo` (optional): Repository in `OWNER/REPO` format. If omitted, resolve it from the checkout''s `origin` remote before running the review.'
- name: origin
  type: string
  required: false
  default_source: caller
  description: '`repo` (optional): Repository in `OWNER/REPO` format. If omitted, resolve it from the checkout''s `origin` remote before running the review.'
- name: repo_root
  type: string
  required: true
  default_source: caller
  description: '`repo_root` (required): Path to the repo checkout.'
defaults: []
outputs:
- task: default
  success_shape: Follow the operator Output Contract/Output section and final stdout sentinel.
  wrote_lines: []
errors:
- class: BLOCKED
  cause: Required input or required artifact is missing, unreadable, or outside operator scope.
  recovery: Provide the missing input or route to the correct operator.
- class: NEEDS_INPUT
  cause: A user-owned decision is required before safe completion.
  recovery: Write the question artifact when the operator convention requires one, then stop.
side_effects:
- Writes only artifacts declared by the operator body.
must_delegate: []
forbidden_direct:
- Do not bypass the operator body, anti-scope, or stop conditions.
