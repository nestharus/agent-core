schema: operator-contract-v1
source: agents/research-router.md
model: gpt-high
description: Classify research requests and recommend the current research workflow target.
contract_status: minimum-generated-from-operator-sections
inputs:
- name: question
  type: string
  required: true
  default_source: caller
  description: '`question` (required) - the research question or candidate research request to classify.'
- name: context
  type: string
  required: false
  default_source: caller
  description: '`context` (optional) - caller, workflow phase, proposal concern, ticket, or prior artifact that explains why classification is needed.'
- name: source_constraints
  type: string
  required: false
  default_source: caller
  description: '`source_constraints` (optional) - required source classes, recency, primary-source rules, domains, exclusions, or citation expectations.'
- name: caller_type
  type: string
  required: false
  default_source: caller
  description: '`caller_type` (optional) - `direct-user` when the user typed the request, or `agent` when another operator dispatched this router.'
- name: agent
  type: string
  required: false
  default_source: caller
  description: '`caller_type` (optional) - `direct-user` when the user typed the request, or `agent` when another operator dispatched this router.'
- name: scratch_dir
  type: string
  required: true
  default_source: caller
  description: '`scratch_dir` (required only for agent-originated ambiguity) - location for a `NEEDS_INPUT` question artifact following `agent-questions-and-session-graph.md`; if an agent-originated request is ambiguous and this is missing, return `BLOCKED:<reason>`.'
- name: NEEDS_INPUT
  type: string
  required: true
  default_source: caller
  description: '`scratch_dir` (required only for agent-originated ambiguity) - location for a `NEEDS_INPUT` question artifact following `agent-questions-and-session-graph.md`; if an agent-originated request is ambiguous and this is missing, return `BLOCKED:<reason>`.'
- name: BLOCKED
  type: string
  required: true
  default_source: caller
  description: '`scratch_dir` (required only for agent-originated ambiguity) - location for a `NEEDS_INPUT` question artifact following `agent-questions-and-session-graph.md`; if an agent-originated request is ambiguous and this is missing, return `BLOCKED:<reason>`.'
- name: current_targets
  type: string
  required: true
  default_source: caller
  description: '`current_targets` (repo-derived) - `research.md` is the current landed execution workflow; no deployed `research-team` workflow is assumed.'
defaults: []
outputs:
- task: default
  success_shape: Follow the operator Output Contract/Output section and final stdout sentinel.
  wrote_lines: []
errors:
- class: BLOCKED
  cause: Required input or required artifact is missing, unreadable, or outside operator scope.
  recovery: Provide the missing input or route to the correct operator.
- class: NEEDS_INPUT
  cause: A user-owned decision is required before safe completion.
  recovery: Write the question artifact when the operator convention requires one, then stop.
side_effects:
- Writes only artifacts declared by the operator body.
must_delegate: []
forbidden_direct:
- Do not bypass the operator body, anti-scope, or stop conditions.
