schema: operator-contract-v1
source: agents/philosophy-bootstrap.md
model: gpt-high
description: Create the initial product philosophy from a fresh brief and existing problem definition.
contract_status: minimum-generated-from-operator-sections
inputs:
- name: brief_path
  type: string
  required: true
  default_source: caller
  description: '`brief_path` (path): readable markdown brief describing product intent, context, constraints, and known values.'
- name: problem_path
  type: string
  required: true
  default_source: caller
  description: '`problem_path` (path): readable existing `problem.md` that grounds the philosophy; this operator will not proceed without it.'
- name: philosophy_path
  type: string
  required: true
  default_source: caller
  description: '`philosophy_path` (path): target path for the initial `philosophy.md`; must be absent or explicitly authorized for overwrite.'
- name: scratch_dir
  type: string
  required: true
  default_source: caller
  description: '`scratch_dir` (path): writable directory for run notes, validation artifacts, and question files.'
defaults: []
outputs:
- task: default
  success_shape: Follow the operator Output Contract/Output section and final stdout sentinel.
  wrote_lines: []
errors:
- class: BLOCKED
  cause: Required input or required artifact is missing, unreadable, or outside operator scope.
  recovery: Provide the missing input or route to the correct operator.
- class: NEEDS_INPUT
  cause: A user-owned decision is required before safe completion.
  recovery: Write the question artifact when the operator convention requires one, then stop.
side_effects:
- Writes only artifacts declared by the operator body.
must_delegate: []
forbidden_direct:
- Do not bypass the operator body, anti-scope, or stop conditions.
