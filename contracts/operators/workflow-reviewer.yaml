schema: operator-contract-v1
source: agents/workflow-reviewer.md
model: gpt-xhigh
description: Verify a workflow execution complied with its operator procedure. Compares reported step log to required steps in the operator file. PASS or FAIL with specific violations. Read-only.
contract_status: minimum-generated-from-operator-sections
inputs:
- name: operator_file
  type: string
  required: true
  default_source: caller
  description: '`operator_file`: path to the `agents/<name>.md` whose procedure is being verified (e.g., `agents/jj-operator.md`)'
- name: step_log
  type: string
  required: true
  default_source: caller
  description: "`step_log`: the executing agent's reported step list \u2014 either a file path (`.log` or `.md`) or inline text"
- name: expected_outputs
  type: string
  required: false
  default_source: caller
  description: '`expected_outputs` (optional): list of artifact paths the operator was supposed to produce (`.report.md`, edited files, force-pushed branch, etc.); reviewer verifies they exist'
- name: mode
  type: string
  required: false
  default_source: caller
  description: '`mode` (optional, default `strict`): `strict` (every required step must appear) or `outcome` (skipped steps OK if final output is correct)'
- name: strict
  type: string
  required: false
  default_source: caller
  description: '`mode` (optional, default `strict`): `strict` (every required step must appear) or `outcome` (skipped steps OK if final output is correct)'
- name: outcome
  type: string
  required: false
  default_source: caller
  description: '`mode` (optional, default `strict`): `strict` (every required step must appear) or `outcome` (skipped steps OK if final output is correct)'
defaults: []
outputs:
- task: default
  success_shape: Follow the operator Output Contract/Output section and final stdout sentinel.
  wrote_lines: []
errors:
- class: BLOCKED
  cause: Required input or required artifact is missing, unreadable, or outside operator scope.
  recovery: Provide the missing input or route to the correct operator.
- class: NEEDS_INPUT
  cause: A user-owned decision is required before safe completion.
  recovery: Write the question artifact when the operator convention requires one, then stop.
side_effects:
- Writes only artifacts declared by the operator body.
must_delegate: []
forbidden_direct:
- Do not bypass the operator body, anti-scope, or stop conditions.
