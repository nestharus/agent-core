schema: operator-contract-v1
source: agents/test-writer.md
model: gpt-high
description: "Write tests for VERIFIED intended behavior only \u2014 never capture current behavior without evidence of correctness"
contract_status: minimum-generated-from-operator-sections
inputs:
- name: behavior_spec
  type: string
  required: true
  default_source: caller
  description: '`behavior_spec`: Path to the verified behavior specification (from behavior-investigator or human review)'
- name: worktree_path
  type: string
  required: true
  default_source: caller
  description: '`worktree_path`: Path to the codebase'
- name: test_type
  type: string
  required: true
  default_source: caller
  description: '`test_type`: One of: `unit`, `integration`, `component`, `e2e`'
- name: unit
  type: string
  required: true
  default_source: caller
  description: '`test_type`: One of: `unit`, `integration`, `component`, `e2e`'
- name: integration
  type: string
  required: true
  default_source: caller
  description: '`test_type`: One of: `unit`, `integration`, `component`, `e2e`'
- name: component
  type: string
  required: true
  default_source: caller
  description: '`test_type`: One of: `unit`, `integration`, `component`, `e2e`'
- name: e2e
  type: string
  required: true
  default_source: caller
  description: '`test_type`: One of: `unit`, `integration`, `component`, `e2e`'
- name: target
  type: string
  required: true
  default_source: caller
  description: '`target`: The code being tested (file path + function/class)'
- name: report_bundle_dir
  type: string
  required: false
  default_source: caller
  description: '`report_bundle_dir` (optional): Directory where report Markdown, PDFs, screenshots, and non-UI evidence should be written.'
- name: report_slug
  type: string
  required: false
  default_source: caller
  description: '`report_slug` (optional): Stable slug for report artifact names.'
defaults: []
outputs:
- task: default
  success_shape: Follow the operator Output Contract/Output section and final stdout sentinel.
  wrote_lines: []
errors:
- class: BLOCKED
  cause: Required input or required artifact is missing, unreadable, or outside operator scope.
  recovery: Provide the missing input or route to the correct operator.
- class: NEEDS_INPUT
  cause: A user-owned decision is required before safe completion.
  recovery: Write the question artifact when the operator convention requires one, then stop.
side_effects:
- Writes only artifacts declared by the operator body.
must_delegate: []
forbidden_direct:
- Do not bypass the operator body, anti-scope, or stop conditions.
