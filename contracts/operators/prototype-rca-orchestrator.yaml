schema: operator-contract-v1
source: agents/prototype-rca-orchestrator.md
model: gpt-xhigh
description: Orchestrate the light prototype RCA loop for one failed behavior test or QA observation, dispatching root cause and one narrow fix cycle before handback.
contract_status: minimum-generated-from-operator-sections
inputs:
- name: trigger_type
  type: string
  required: true
  default_source: caller
  description: '`trigger_type`: `test` or `qa`.'
- name: test
  type: string
  required: true
  default_source: caller
  description: '`trigger_type`: `test` or `qa`.'
- name: qa
  type: string
  required: true
  default_source: caller
  description: '`trigger_type`: `test` or `qa`.'
- name: trigger_evidence_path
  type: string
  required: true
  default_source: caller
  description: '`trigger_evidence_path`: absolute path to failing behavior test output or QA observation/screenshot evidence.'
- name: trigger_command
  type: string
  required: true
  default_source: caller
  description: '`trigger_command`: required for `trigger_type: test`; the smallest targeted command, such as `test runner <node-id>`.'
- name: failure_id
  type: string
  required: true
  default_source: caller
  description: '`failure_id`: stable slug for artifact paths.'
- name: repo_root
  type: string
  required: true
  default_source: caller
  description: '`repo_root`: absolute repository root for reading source and history.'
- name: worktree_path
  type: string
  required: true
  default_source: caller
  description: '`worktree_path`: absolute writable worktree for the Phase 2 fix dispatch.'
- name: planning_dir
  type: string
  required: true
  default_source: caller
  description: '`planning_dir`: durable artifact root; pass it to Phase 1 as `planning_root`.'
- name: planning_root
  type: string
  required: true
  default_source: caller
  description: '`planning_dir`: durable artifact root; pass it to Phase 1 as `planning_root`.'
- name: scratch_dir
  type: string
  required: true
  default_source: caller
  description: '`scratch_dir`: transient prompt, log, and question root.'
- name: handback_callback
  type: string
  required: true
  default_source: caller
  description: '`handback_callback`: caller resume target and return path.'
- name: qa_use_case_id
  type: string
  required: true
  default_source: caller
  description: '`qa_use_case_id`: required for `trigger_type: qa`; ignored for `trigger_type: test` unless the caller supplies it for context.'
defaults: []
outputs:
- task: default
  success_shape: Follow the operator Output Contract/Output section and final stdout sentinel.
  wrote_lines: []
errors:
- class: BLOCKED
  cause: Required input or required artifact is missing, unreadable, or outside operator scope.
  recovery: Provide the missing input or route to the correct operator.
- class: NEEDS_INPUT
  cause: A user-owned decision is required before safe completion.
  recovery: Write the question artifact when the operator convention requires one, then stop.
side_effects:
- Writes only artifacts declared by the operator body.
must_delegate: []
forbidden_direct:
- Do not bypass the operator body, anti-scope, or stop conditions.
