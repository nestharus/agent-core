schema: operator-contract-v1
source: agents/commit-hygiene-operator.md
model: gpt-high
description: Reorganize PR commits for incremental review (split, reorder, rewrite messages) with per-commit test verification, then force-push. Audit-only mode posts findings without rewriting.
contract_status: minimum-generated-from-operator-sections
inputs:
- name: branch
  type: string
  required: true
  default_source: caller
  description: '`branch`: the branch to operate on (e.g., `feat/windows-helper-exception-narrowing`)'
- name: base
  type: string
  required: true
  default_source: caller
  description: '`base`: the parent branch / merge-base (e.g., `main`, `feat/windows-helper-exception-narrowing` if this branch is stacked)'
- name: main
  type: string
  required: true
  default_source: caller
  description: '`base`: the parent branch / merge-base (e.g., `main`, `feat/windows-helper-exception-narrowing` if this branch is stacked)'
- name: mode
  type: string
  required: true
  default_source: caller
  description: '`mode`: `audit` or `reorganize`'
- name: audit
  type: string
  required: true
  default_source: caller
  description: '`mode`: `audit` or `reorganize`'
- name: reorganize
  type: string
  required: true
  default_source: caller
  description: '`mode`: `audit` or `reorganize`'
- name: target_commit_plan
  type: string
  required: false
  default_source: caller
  description: '`target_commit_plan` (reorganize mode, optional): the orchestrator-supplied target commit sequence (titles + which hunks belong to each). If absent, you generate the plan from the existing diff and explain it before rewriting.'
defaults: []
outputs:
- task: default
  success_shape: Follow the operator Output Contract/Output section and final stdout sentinel.
  wrote_lines: []
errors:
- class: BLOCKED
  cause: Required input or required artifact is missing, unreadable, or outside operator scope.
  recovery: Provide the missing input or route to the correct operator.
- class: NEEDS_INPUT
  cause: A user-owned decision is required before safe completion.
  recovery: Write the question artifact when the operator convention requires one, then stop.
side_effects:
- Writes only artifacts declared by the operator body.
must_delegate: []
forbidden_direct:
- Do not bypass the operator body, anti-scope, or stop conditions.
