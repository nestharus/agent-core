schema: operator-contract-v1
source: agents/post-mortem-author.md
model: gpt-high
description: Synthesizes a post-mortem from incident-investigator findings and the incident brief, then writes one Markdown document
contract_status: minimum-generated-from-operator-sections
inputs:
- name: findings_path
  type: string
  required: true
  default_source: caller
  description: '`findings_path` (required) - Path to the structured Markdown findings emitted by `incident-investigator` (`~/ai/agents/incident-investigator.md`). Expect per-question verdicts such as `confirmed`, `probable`, and `unverified`; suspect classifications such as `causal`, `contributing`, and `incidental`; and caveats such as `unverifiable from code alone`.'
- name: confirmed
  type: string
  required: true
  default_source: caller
  description: '`findings_path` (required) - Path to the structured Markdown findings emitted by `incident-investigator` (`~/ai/agents/incident-investigator.md`). Expect per-question verdicts such as `confirmed`, `probable`, and `unverified`; suspect classifications such as `causal`, `contributing`, and `incidental`; and caveats such as `unverifiable from code alone`.'
