schema: operator-contract-v1
source: agents/problem-expansion-integrate.md
model: gpt-high
description: 'Stage 1b-integrate of the alignment cycle (synthesis). Run only when problem-classification.md was produced by Stage 1b-classify. Read problem-classification.md + problem-surfaces.md + problem.md + problem-alignment.md and synthesize the integrated text: draft expansions for new-axis and axis-expansion verdicts, update problem.md, and update the axis reference table in problem-alignment.md if new axes were added. Does NOT make classification judgments (that is Stage 1b-classify''s job).'
contract_status: minimum-generated-from-operator-sections
inputs:
- name: problem
  type: string
  required: true
  default_source: caller
  description: "**`problem-classification.md`** \u2014 per-surface verdicts from Stage 1b-classify (authoritative; do not re-judge)."
defaults: []
outputs:
- task: default
  success_shape: Follow the operator Output Contract/Output section and final stdout sentinel.
  wrote_lines: []
errors:
- class: BLOCKED
  cause: Required input or required artifact is missing, unreadable, or outside operator scope.
  recovery: Provide the missing input or route to the correct operator.
- class: NEEDS_INPUT
  cause: A user-owned decision is required before safe completion.
  recovery: Write the question artifact when the operator convention requires one, then stop.
side_effects:
- Writes only artifacts declared by the operator body.
must_delegate: []
forbidden_direct:
- Do not bypass the operator body, anti-scope, or stop conditions.
