schema: operator-contract-v1
source: agents/incident-investigator.md
model: gpt-high
description: Investigate an incident from a brief, evidence directory, and read-only repository, then write evidence-backed findings without mutating code or external systems
contract_status: minimum-generated-from-operator-sections
inputs:
- name: incident_brief_path
  type: string
  required: true
  default_source: caller
  description: '`incident_brief_path` (required) - Markdown or text brief naming the incident context, symptoms, hypotheses, evidence references, and open questions.'
- name: evidence_dir
  type: string
  required: true
  default_source: caller
  description: '`evidence_dir` (required) - Directory containing captured evidence such as transcripts, diffs, logs, screenshots, reproduction notes, prior findings, or ticket exports.'
- name: repo_root
  type: string
  required: true
  default_source: caller
  description: '`repo_root` (required) - Repository root to inspect with read-only file operations and read-only git inspection.'
- name: findings_path
  type: string
  required: false
  default_source: caller
  description: '`findings_path` (optional) - Destination for the findings document; default is `${evidence_dir}/findings.md`.'
defaults: []
outputs:
- task: default
  success_shape: Follow the operator Output Contract/Output section and final stdout sentinel.
  wrote_lines: []
errors:
- class: BLOCKED
  cause: Required input or required artifact is missing, unreadable, or outside operator scope.
  recovery: Provide the missing input or route to the correct operator.
- class: NEEDS_INPUT
  cause: A user-owned decision is required before safe completion.
  recovery: Write the question artifact when the operator convention requires one, then stop.
side_effects:
- Writes only artifacts declared by the operator body.
must_delegate: []
forbidden_direct:
- Do not bypass the operator body, anti-scope, or stop conditions.
