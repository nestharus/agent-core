schema: operator-contract-v1
source: agents/philosophy-expansion-classify.md
model: gpt-xhigh
description: 'Stage 2b-classify of the alignment cycle (judge). Run only when philosophy-surfaces.md was produced by Stage 2. Read philosophy-surfaces.md + philosophy.md + philosophy-alignment.md and judge each concern (A-absorbable / B-compatible / C-tension / D-new-axis / E-contradiction). Write philosophy-classification.md (always) and philosophy-decisions.md (only when concerns require user input: tensions, new axes, contradictions). Does NOT modify philosophy.md (that is the integrate stage''s job).'
contract_status: minimum-generated-from-operator-sections
inputs:
- name: philosophy
  type: string
  required: true
  default_source: caller
  description: "**Philosophy surfaces** (`philosophy-surfaces.md`) \u2014 new philosophical concerns discovered by Stage 2 philosophy-alignment."
- name: Product
  type: string
  required: true
  default_source: caller
  description: "**Product philosophy** (`philosophy.md`) \u2014 the current philosophy."
defaults: []
outputs:
- task: default
  success_shape: Follow the operator Output Contract/Output section and final stdout sentinel.
  wrote_lines: []
errors:
- class: BLOCKED
  cause: Required input or required artifact is missing, unreadable, or outside operator scope.
  recovery: Provide the missing input or route to the correct operator.
- class: NEEDS_INPUT
  cause: A user-owned decision is required before safe completion.
  recovery: Write the question artifact when the operator convention requires one, then stop.
side_effects:
- Writes only artifacts declared by the operator body.
must_delegate: []
forbidden_direct:
- Do not bypass the operator body, anti-scope, or stop conditions.
