schema: operator-contract-v1
source: agents/pattern-auditor.md
model: gpt-high
description: Read-only pattern audit for per-file regression-enabling code shapes without mutating source
contract_status: minimum-generated-from-operator-sections
inputs:
- name: surface_path
  type: string
  required: true
  default_source: caller
  description: '`surface_path` - file or coherent surface to audit.'
- name: surface_context
  type: string
  required: true
  default_source: caller
  description: '`surface_context` or `surface_scope_path` - incident-specific context and neighboring surface list.'
- name: surface_scope_path
  type: string
  required: true
  default_source: caller
  description: '`surface_context` or `surface_scope_path` - incident-specific context and neighboring surface list.'
- name: repo_root
  type: string
  required: true
  default_source: caller
  description: '`repo_root` - repository root for read-only inspection.'
- name: planning_dir
  type: string
  required: true
  default_source: caller
  description: '`planning_dir` - durable planning artifact root for context.'
- name: incident_id
  type: string
  required: true
  default_source: caller
  description: '`incident_id` - stable incident slug.'
- name: incident_artifact_path
  type: string
  required: true
  default_source: caller
  description: '`incident_artifact_path` - incident evidence to bind findings to the regression.'
- name: output_path
  type: string
  required: true
  default_source: caller
  description: '`output_path` - Markdown report destination.'
defaults: []
outputs:
- task: default
  success_shape: Follow the operator Output Contract/Output section and final stdout sentinel.
  wrote_lines: []
errors:
- class: BLOCKED
  cause: Required input or required artifact is missing, unreadable, or outside operator scope.
  recovery: Provide the missing input or route to the correct operator.
- class: NEEDS_INPUT
  cause: A user-owned decision is required before safe completion.
  recovery: Write the question artifact when the operator convention requires one, then stop.
side_effects:
- Writes only artifacts declared by the operator body.
must_delegate: []
forbidden_direct:
- Do not bypass the operator body, anti-scope, or stop conditions.
