schema: operator-contract-v1
source: agents/coverage-auditor.md
model: gpt-xhigh
description: 'Audit existing tests: flag unverified behavior capture, dead CI tests, low-value tests, coverage enforcement recommendations'
contract_status: minimum-generated-from-operator-sections
inputs:
- name: task
  type: string
  required: true
  default_source: caller
  description: '`task`: One of: `audit-existing`, `validate-new`, `full-audit`'
- name: worktree_path
  type: string
  required: true
  default_source: caller
  description: '`worktree_path`: Path to the codebase'
- name: test_files
  type: string
  required: true
  default_source: caller
  description: '`test_files` (for validate-new): Paths to newly written test files'
- name: behavior_specs
  type: string
  required: true
  default_source: caller
  description: '`behavior_specs` (for validate-new): Paths to the behavior specs the tests claim to verify'
- name: report_bundle_dir
  type: string
  required: false
  default_source: caller
  description: '`report_bundle_dir` (optional): Report bundle to validate against `~/ai/conventions/test-reports.md`.'
defaults: []
outputs:
- task: default
  success_shape: Follow the operator Output Contract/Output section and final stdout sentinel.
  wrote_lines: []
errors:
- class: BLOCKED
  cause: Required input or required artifact is missing, unreadable, or outside operator scope.
  recovery: Provide the missing input or route to the correct operator.
- class: NEEDS_INPUT
  cause: A user-owned decision is required before safe completion.
  recovery: Write the question artifact when the operator convention requires one, then stop.
side_effects:
- Writes only artifacts declared by the operator body.
must_delegate: []
forbidden_direct:
- Do not bypass the operator body, anti-scope, or stop conditions.
