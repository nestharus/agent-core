schema: operator-contract-v1
source: agents/decision-encoder.md
model: gpt-high
description: Maintain canonical audit history after revise/review rounds by encoding findings, role determinations, watch signals, and summarization tail.
contract_status: minimum-generated-from-operator-sections
inputs:
- name: audit_history_path
  type: string
  required: true
  default_source: caller
  description: "`--input audit_history_path=<path>` (required) \u2014 canonical audit-history file to create or update."
- name: round_number
  type: string
  required: true
  default_source: caller
  description: "`--input round_number=<n>` (required) \u2014 revise/review round being encoded."
- name: artifact_under_review
  type: string
  required: true
  default_source: caller
  description: "`--input artifact_under_review=<path-or-id>` (required) \u2014 artifact reviewed this round."
- name: round_artifacts
  type: string
  required: true
  default_source: caller
  description: "`--input round_artifacts=<paths>` (required) \u2014 comma-separated or newline list of round outputs, including review reports and role outputs."
- name: role_outputs
  type: string
  required: true
  default_source: caller
  description: "`--input role_outputs=<paths>` (required) \u2014 role outputs containing findings, counters, verdicts, or determinations."
- name: deciding
  type: string
  required: true
  default_source: caller
  description: Question and answer artifacts from `~/ai/conventions/agent-questions-and-session-graph.md` may be supplied in `role_outputs` when they affect a loop decision. Gate-affecting answers must be recorded in the decision register's existing `deciding inputs` field, not in a new field. The supplementary `User Q&A Inputs` section carries `question_id`, question and answer artifact paths, continuation method, applied-to target, and continuation evidence. Return `NEEDS_INPUT` if an answer is present but application evidence is missing for a decision that claims to use it.
- name: User
  type: string
  required: true
  default_source: caller
  description: Question and answer artifacts from `~/ai/conventions/agent-questions-and-session-graph.md` may be supplied in `role_outputs` when they affect a loop decision. Gate-affecting answers must be recorded in the decision register's existing `deciding inputs` field, not in a new field. The supplementary `User Q&A Inputs` section carries `question_id`, question and answer artifact paths, continuation method, applied-to target, and continuation evidence. Return `NEEDS_INPUT` if an answer is present but application evidence is missing for a decision that claims to use it.
- name: question_id
  type: string
  required: true
  default_source: caller
  description: Question and answer artifacts from `~/ai/conventions/agent-questions-and-session-graph.md` may be supplied in `role_outputs` when they affect a loop decision. Gate-affecting answers must be recorded in the decision register's existing `deciding inputs` field, not in a new field. The supplementary `User Q&A Inputs` section carries `question_id`, question and answer artifact paths, continuation method, applied-to target, and continuation evidence. Return `NEEDS_INPUT` if an answer is present but application evidence is missing for a decision that claims to use it.
- name: NEEDS_INPUT
  type: string
  required: true
  default_source: caller
  description: Question and answer artifacts from `~/ai/conventions/agent-questions-and-session-graph.md` may be supplied in `role_outputs` when they affect a loop decision. Gate-affecting answers must be recorded in the decision register's existing `deciding inputs` field, not in a new field. The supplementary `User Q&A Inputs` section carries `question_id`, question and answer artifact paths, continuation method, applied-to target, and continuation evidence. Return `NEEDS_INPUT` if an answer is present but application evidence is missing for a decision that claims to use it.
- name: mode
  type: string
  required: false
  default_source: caller
  description: "`--input mode=<append|update|summarize>` (optional, default `update`) \u2014 `append` adds a new round, `update` appends and updates active sections, `summarize` only compacts eligible older entries."
- name: update
  type: string
  required: false
  default_source: caller
  description: "`--input mode=<append|update|summarize>` (optional, default `update`) \u2014 `append` adds a new round, `update` appends and updates active sections, `summarize` only compacts eligible older entries."
- name: append
  type: string
  required: false
  default_source: caller
  description: "`--input mode=<append|update|summarize>` (optional, default `update`) \u2014 `append` adds a new round, `update` appends and updates active sections, `summarize` only compacts eligible older entries."
- name: summarize
  type: string
  required: false
  default_source: caller
  description: "`--input mode=<append|update|summarize>` (optional, default `update`) \u2014 `append` adds a new round, `update` appends and updates active sections, `summarize` only compacts eligible older entries."
defaults: []
outputs:
- task: default
  success_shape: Follow the operator Output Contract/Output section and final stdout sentinel.
  wrote_lines: []
errors:
- class: BLOCKED
  cause: Required input or required artifact is missing, unreadable, or outside operator scope.
  recovery: Provide the missing input or route to the correct operator.
- class: NEEDS_INPUT
  cause: A user-owned decision is required before safe completion.
  recovery: Write the question artifact when the operator convention requires one, then stop.
side_effects:
- Writes only artifacts declared by the operator body.
must_delegate: []
forbidden_direct:
- Do not bypass the operator body, anti-scope, or stop conditions.
