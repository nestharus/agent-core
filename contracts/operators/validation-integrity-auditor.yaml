schema: operator-contract-v1
source: agents/validation-integrity-auditor.md
model: gpt-high
description: Audit PR diffs and RCA dossier diffs for validation-surface weakening against runtime-fix claims.
contract_status: minimum-generated-from-operator-sections
inputs:
- name: mode
  type: string
  required: true
  default_source: caller
  description: '`mode=<pr-diff|rca-dossier>` (required) - selects the input surface.'
- name: diff_path
  type: string
  required: true
  default_source: caller
  description: '`diff_path=<absolute-path>` (required when `mode=pr-diff`) - unified PR diff or equivalent patch evidence.'
- name: dossier_diff_path
  type: string
  required: true
  default_source: caller
  description: '`dossier_diff_path=<absolute-path>` (required when `mode=rca-dossier`) - RCA verification-phase diff or dossier patch evidence.'
- name: runtime_claim
  type: string
  required: true
  default_source: caller
  description: '`runtime_claim=<text>` (required) - one paragraph naming the runtime behavior the diff or dossier claims to validate.'
- name: decisions_path
  type: string
  required: false
  default_source: caller
  description: '`decisions_path=<absolute-path>` (optional) - DECISIONS.md path used only for explicit validation-surface weakening ratification.'
- name: runtime_artifact_evidence_path
  type: string
  required: false
  default_source: caller
  description: '`runtime_artifact_evidence_path=<absolute-path>` (optional) - runtime-artifact validation evidence such as a build log, container exec log, production-path command log, state DB evidence, or deployed environment check.'
- name: report_path
  type: string
  required: true
  default_source: caller
  description: '`report_path=<absolute-path>` (required) - Markdown report destination; this is the only path you write.'
- name: worktree_path
  type: string
  required: true
  default_source: caller
  description: '`worktree_path=<absolute-path>` (required) - repository worktree used to resolve relative evidence paths.'
- name: wu_id
  type: string
  required: false
  default_source: caller
  description: '`wu_id=<id>` (optional) - Work Unit identifier for report-local finding namespacing.'
defaults: []
outputs:
- task: default
  success_shape: Follow the operator Output Contract/Output section and final stdout sentinel.
  wrote_lines: []
errors:
- class: BLOCKED
  cause: Required input or required artifact is missing, unreadable, or outside operator scope.
  recovery: Provide the missing input or route to the correct operator.
- class: NEEDS_INPUT
  cause: A user-owned decision is required before safe completion.
  recovery: Write the question artifact when the operator convention requires one, then stop.
side_effects:
- Writes only artifacts declared by the operator body.
must_delegate: []
forbidden_direct:
- Do not bypass the operator body, anti-scope, or stop conditions.
