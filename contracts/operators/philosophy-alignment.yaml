schema: operator-contract-v1
source: agents/philosophy-alignment.md
model: gpt-xhigh
description: Stage 2 of the alignment cycle. Run only when problem-review.md has axes-aligned entries. Read philosophy.md + proposal.md + problem-review.md and determine whether the proposal embodies the philosophy for problems it correctly aims at. Write philosophy-review.md (always); write philosophy-surfaces.md only if new philosophical concerns were discovered.
contract_status: minimum-generated-from-operator-sections
inputs:
- name: Product
  type: string
  required: true
  default_source: caller
  description: "**Product philosophy** (`philosophy.md`) \u2014 the principles that govern how we think and design"
- name: philosophy
  type: string
  required: true
  default_source: caller
  description: "**Product philosophy** (`philosophy.md`) \u2014 the principles that govern how we think and design"
- name: Proposal
  type: string
  required: true
  default_source: caller
  description: "**Proposal** (`proposal.md`) \u2014 the system design being reviewed"
- name: problem
  type: string
  required: true
  default_source: caller
  description: "**Problem review** (`problem-review.md`) \u2014 Stage 1 output containing the list of aligned axes to review"
defaults: []
outputs:
- task: default
  success_shape: Follow the operator Output Contract/Output section and final stdout sentinel.
  wrote_lines: []
errors:
- class: BLOCKED
  cause: Required input or required artifact is missing, unreadable, or outside operator scope.
  recovery: Provide the missing input or route to the correct operator.
- class: NEEDS_INPUT
  cause: A user-owned decision is required before safe completion.
  recovery: Write the question artifact when the operator convention requires one, then stop.
side_effects:
- Writes only artifacts declared by the operator body.
must_delegate: []
forbidden_direct:
- Do not bypass the operator body, anti-scope, or stop conditions.
