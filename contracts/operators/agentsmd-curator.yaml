schema: operator-contract-v1
source: agents/agentsmd-curator.md
model: gpt-high
description: Audit and edit AGENTS.md + the agents/ ecosystem against architecture rules. Procedures live in operator files; AGENTS.md is routing + workflow topology only. Audit mode reports; edit mode applies changes.
contract_status: minimum-generated-from-operator-sections
inputs:
- name: mode
  type: string
  required: true
  default_source: caller
  description: '`mode`: `audit` | `edit` | `add-operator`'
- name: audit
  type: string
  required: true
  default_source: caller
  description: '`mode`: `audit` | `edit` | `add-operator`'
- name: edit
  type: string
  required: true
  default_source: caller
  description: '`mode`: `audit` | `edit` | `add-operator`'
- name: agents_md
  type: string
  required: true
  default_source: caller
  description: '`agents_md`: usually `${repo_root}/AGENTS.md`'
- name: agents_dir
  type: string
  required: true
  default_source: caller
  description: '`agents_dir`: usually `~/ai/agents`'
- name: findings_to_fix
  type: string
  required: true
  default_source: caller
  description: '`findings_to_fix` (edit mode): list of finding IDs from a prior audit; only those are touched'
- name: operator_file
  type: string
  required: true
  default_source: caller
  description: '`operator_file` (add-operator mode): path to the new operator file'
- name: routing_entry
  type: string
  required: true
  default_source: caller
  description: '`routing_entry` (add-operator mode): cue, required inputs, mode hint'
defaults: []
outputs:
- task: default
  success_shape: Follow the operator Output Contract/Output section and final stdout sentinel.
  wrote_lines: []
errors:
- class: BLOCKED
  cause: Required input or required artifact is missing, unreadable, or outside operator scope.
  recovery: Provide the missing input or route to the correct operator.
- class: NEEDS_INPUT
  cause: A user-owned decision is required before safe completion.
  recovery: Write the question artifact when the operator convention requires one, then stop.
side_effects:
- Writes only artifacts declared by the operator body.
must_delegate: []
forbidden_direct:
- Do not bypass the operator body, anti-scope, or stop conditions.
