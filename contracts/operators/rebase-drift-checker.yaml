schema: operator-contract-v1
source: agents/rebase-drift-checker.md
model: gpt-xhigh
description: Detect rebase drift by comparing caller-supplied merged-base changes with a Work Unit touched-surface map
contract_status: minimum-generated-from-operator-sections
inputs:
- name: merged_base_diff_path
  type: string
  required: true
  default_source: caller
  description: '`merged_base_diff_path` - Absolute path to the caller-supplied unified diff of changes introduced by the target/base while the WU was in flight. Common sources are verified-rebase `main-delta.patch` or `target-delta.patch`, but you do not compute them.'
- name: main
  type: string
  required: true
  default_source: caller
  description: '`merged_base_diff_path` - Absolute path to the caller-supplied unified diff of changes introduced by the target/base while the WU was in flight. Common sources are verified-rebase `main-delta.patch` or `target-delta.patch`, but you do not compute them.'
- name: target
  type: string
  required: true
  default_source: caller
  description: '`merged_base_diff_path` - Absolute path to the caller-supplied unified diff of changes introduced by the target/base while the WU was in flight. Common sources are verified-rebase `main-delta.patch` or `target-delta.patch`, but you do not compute them.'
- name: problem_map_path
  type: string
  required: true
  default_source: caller
  description: '`problem_map_path` - Absolute path to the WU Phase 2.5 problem map containing the touched-surface enumeration.'
- name: report_path
  type: string
  required: true
  default_source: caller
  description: '`report_path` - Absolute output path for the Markdown overlap report. The caller default is `${planning_dir}/risk/<wu>-rebase-drift.md`.'
defaults: []
outputs:
- task: default
  success_shape: Follow the operator Output Contract/Output section and final stdout sentinel.
  wrote_lines: []
errors:
- class: BLOCKED
  cause: Required input or required artifact is missing, unreadable, or outside operator scope.
  recovery: Provide the missing input or route to the correct operator.
- class: NEEDS_INPUT
  cause: A user-owned decision is required before safe completion.
  recovery: Write the question artifact when the operator convention requires one, then stop.
side_effects:
- Writes only artifacts declared by the operator body.
must_delegate: []
forbidden_direct:
- Do not bypass the operator body, anti-scope, or stop conditions.
