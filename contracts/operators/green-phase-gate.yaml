schema: operator-contract-v1
source: agents/green-phase-gate.md
model: gpt-high
description: "Re-run the red-phase node IDs against the implementer's HEAD and classify whether each turned green. Advisory \u2014 informs the implementer whether implementation drove the tests green without regressing previously-green tests."
contract_status: minimum-generated-from-operator-sections
inputs:
- name: project_dir
  type: string
  required: true
  default_source: caller
  description: '`project_dir`, `scratch_dir`'
- name: scratch_dir
  type: string
  required: true
  default_source: caller
  description: '`project_dir`, `scratch_dir`'
- name: base_ref
  type: string
  required: true
  default_source: caller
  description: "`base_ref` (default `origin/main`) \u2014 informational only; this gate"
- name: red_phase_report
  type: string
  required: true
  default_source: caller
  description: "`red_phase_report` (path) \u2014 required; the `RED_PHASE.md` written by"
defaults: []
outputs:
- task: default
  success_shape: Follow the operator Output Contract/Output section and final stdout sentinel.
  wrote_lines: []
errors:
- class: BLOCKED
  cause: Required input or required artifact is missing, unreadable, or outside operator scope.
  recovery: Provide the missing input or route to the correct operator.
- class: NEEDS_INPUT
  cause: A user-owned decision is required before safe completion.
  recovery: Write the question artifact when the operator convention requires one, then stop.
side_effects:
- Writes only artifacts declared by the operator body.
must_delegate: []
forbidden_direct:
- Do not bypass the operator body, anti-scope, or stop conditions.
