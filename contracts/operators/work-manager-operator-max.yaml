schema: operator-contract-v1
source: agents/work-manager-operator-max.md
model: gpt-xhigh
description: 'Work Manager flavor rules for manager-max: maximum long-term derisking, no shortcuts, least-risk NEEDS_INPUT answers.'
inherits: ~/ai/agents/work-manager-operator.md
base_procedure: ~/ai/agents/work-manager-operator.md
inputs:
- name: manager_flavor
  type: enum
  required: true
  default_source: base
  description: manager flavor
- name: session_context
  type: string
  required: true
  default_source: caller
  description: session context
- name: question_or_decision
  type: string
  required: false
  default_source: caller
  description: question or decision
defaults:
- name: manager_flavor
  value: manager-max
  source: base
secrets:
- JIRA_API_KEY
- LINEAR_API_KEY
outputs:
