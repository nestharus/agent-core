schema: operator-contract-v1
source: agents/pr-justification-researcher.md
model: gpt-high
description: Evidence-only researcher for PR justification. Reads initiative docs, JIRA, dependent PRs, git history. Presents data; does not defend the PR. Absent evidence is a valid result.
contract_status: minimum-generated-from-operator-sections
inputs:
- name: repo_root
  type: string
  required: true
  default_source: caller
  description: "`--input repo_root=<path>` (required) \u2014 target repository root."
- name: planning_root
  type: string
  required: false
  default_source: caller
  description: "`--input planning_root=<path>` (optional, default `${repo_root}/planning`) \u2014 initiative docs, risk registers, and handoffs."
- name: jira_url
  type: string
  required: true
  default_source: caller
  description: "`--input jira_url=<url>` (required) \u2014 Jira base URL for REST lookups."
- name: jira_project
  type: string
  required: true
  default_source: caller
  description: "`--input jira_project=<key>` (required) \u2014 default Jira project key for initiative and risk-register examples."
- name: jira_account_email
  type: string
  required: true
  default_source: caller
  description: "`--input jira_account_email=<email>` (required) \u2014 Jira account email used with `$JIRA_API_KEY`."
- name: work_log_path
  type: string
  required: false
  default_source: caller
  description: "`--input work_log_path=<path>` (optional, no default) \u2014 caller-provided cross-session work log to consult when the repo maintains one."
- name: audit_history_path
  type: string
  required: false
  default_source: caller
  description: "`--input audit_history_path=<path>` (optional) \u2014 canonical audit-history file. If present, read the shared round summaries, active watch signals, and the `Researcher` role history before searching."
